name: 链接 / 错别字 / 小修复
description: 报告失效链接、错别字、目录计数或 Markdown 跳转问题
title: "[小修复] "
body:
  - type: markdown
    attributes:
      value: |
        这个模板用于小修复。请不要粘贴私人材料、账号信息、日志密钥或未脱敏截图。
  - type: input
    id: file
    attributes:
      label: 文件或页面
      description: 哪个文件或 GitHub 页面有问题？
      placeholder: README.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 说明错别字、坏链、计数不一致或跳转问题。
      placeholder: 第 X 行链接跳转到 404。
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 建议修改
      description: 如果你知道怎么改，请写出建议。
      placeholder: 改成 ...
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: 脱敏确认
      options:
        - label: 我没有提交账号、聊天记录、客户材料、密钥、本地路径、后台截图或未脱敏内容。
          required: true
